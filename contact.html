<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>お問い合わせ | MinaTech Web Studio</title>
<meta name="description" content="MinaTech Web Studioへのお問い合わせ。ホームページ制作のご相談・お見積依頼はこちらから。">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="site-header">
  <div class="container header-inner">
    <a href="index.html" class="logo">MinaTech <span>Web Studio</span></a>
    <nav class="nav">
      <a href="index.html#service">サービス</a>
      <a href="index.html#pricing">料金</a>
      <a href="portfolio.html">実績</a>
      <a href="process.html">制作フロー</a>
      <a href="contact.html" class="btn-nav active">無料相談</a>
    </nav>
    <button class="nav-toggle" aria-label="メニュー">☰</button>
  </div>
</header>

<section class="page-head">
  <div class="container">
    <h1>お問い合わせ</h1>
    <p>無料でご相談・お見積に対応します。1〜2営業日以内にご返信します。</p>
  </div>
</section>

<section class="section">
  <div class="container form-container">
    <form action="https://api.web3forms.com/submit" method="POST" class="contact-form">
      <input type="hidden" name="access_key" value="YOUR_WEB3FORMS_ACCESS_KEY_HERE">
      <input type="hidden" name="subject" value="【MinaTech Web Studio】お問い合わせ">
      <input type="hidden" name="from_name" value="MinaTech Web Studio 問い合わせフォーム">
      <input type="hidden" name="redirect" value="thanks.html">
      <input type="checkbox" name="botcheck" style="display:none;">

      <div class="form-row">
        <label>お名前 <span class="req">必須</span></label>
        <input type="text" name="name" required>
      </div>
      <div class="form-row">
        <label>会社名・店舗名</label>
        <input type="text" name="company">
      </div>
      <div class="form-row">
        <label>メールアドレス <span class="req">必須</span></label>
        <input type="email" name="email" required>
      </div>
      <div class="form-row">
        <label>電話番号</label>
        <input type="tel" name="phone">
      </div>
      <div class="form-row">
        <label>業種</label>
        <input type="text" name="industry" placeholder="例: 美容サロン、不動産、士業">
      </div>
      <div class="form-row">
        <label>ご興味のあるプラン</label>
        <select name="plan">
          <option value="">選択してください</option>
          <option value="light">ライト（80,000円〜）</option>
          <option value="standard">スタンダード（180,000円〜）</option>
          <option value="premium">プレミアム（300,000円〜）</option>
          <option value="undecided">まだ決めていない / 相談したい</option>
        </select>
      </div>
      <div class="form-row">
        <label>現在ホームページをお持ちですか</label>
        <select name="has_site">
          <option value="">選択してください</option>
          <option value="none">持っていない（新規制作）</option>
          <option value="renewal">持っているがリニューアル希望</option>
          <option value="additional">別サイトとして新設希望</option>
        </select>
      </div>
      <div class="form-row">
        <label>公開希望時期</label>
        <select name="timeline">
          <option value="">選択してください</option>
          <option value="2w">できるだけ早く（2週間以内）</option>
          <option value="1m">1ヶ月以内</option>
          <option value="3m">2〜3ヶ月以内</option>
          <option value="undecided">決まっていない</option>
        </select>
      </div>
      <div class="form-row">
        <label>ご相談内容 <span class="req">必須</span></label>
        <textarea name="message" rows="6" required placeholder="現状の課題、やりたいことなど、自由にお書きください。"></textarea>
      </div>

      <div class="form-row form-privacy">
        <label>
          <input type="checkbox" name="privacy_agree" required>
          <a href="privacy.html" target="_blank">プライバシーポリシー</a>に同意する
        </label>
      </div>

      <div class="form-submit">
        <button type="submit" class="btn-primary btn-lg">送信する</button>
      </div>
    </form>

    <div class="contact-alt">
      <p>LINE公式アカウントからのご相談も受付中です。</p>
    </div>
  </div>
</section>

<footer class="site-footer">
  <div class="container footer-inner">
    <div>
      <div class="logo-footer">MinaTech <span>Web Studio</span></div>
      <p class="footer-address">MinaTech株式会社 / 神奈川県<br>Email: <a href="mailto:isoya.h@minatech1210.com">isoya.h@minatech1210.com</a></p>
    </div>
    <nav class="footer-nav">
      <a href="index.html">TOP</a>
      <a href="portfolio.html">実績</a>
      <a href="process.html">制作フロー</a>
      <a href="contact.html">お問い合わせ</a>
    </nav>
    <small class="copyright">© 2026 MinaTech, Inc.</small>
  </div>
</footer>

<script src="main.js"></script>
<script>
  const params = new URLSearchParams(window.location.search);
  const plan = params.get('plan');
  if (plan) {
    const sel = document.querySelector('select[name="plan"]');
    if (sel) sel.value = plan;
  }
</script>
</body>
</html>
